<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will You Be My Valentine?</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: #ffd1dc;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }
    .card {
        background: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 400px;
        animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }
    h1 {
        font-size: 1.9rem;
        color: #ff3366;
        margin-bottom: 25px;
    }
    button {
        padding: 15px 28px;
        font-size: 1.2rem;
        border: 0;
        border-radius: 8px;
        margin: 10px;
        cursor: pointer;
        transition: 0.3s;
    }
    #yesBtn {
        background: #ff3366;
        color: white;
    }
    #noBtn {
        background: #fff;
        color: #ff3366;
        border: 2px solid #ff3366;
        position: absolute;
    }
    .final-msg {
        display: none;
        font-size: 1.4rem;
        color: #ff3366;
        padding: 20px;
    }
    .heart {
        position: absolute;
        font-size: 22px;
        animation: float 6s ease-in infinite;
    }
    @keyframes float {
        0% { transform: translateY(100vh); opacity: 1; }
        100% { transform: translateY(-20vh); opacity: 0; }
    }
</style>
</head>

<body>

<div class="card" id="mainCard">
    <h1>Will you be my Valentine, Aaki?</h1>
    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 🙈</button>
</div>

<div class="final-msg" id="finalMsg">
    💕 I knew you will say YES 💕<br><br>
    Mera ublu love from your <b>buba</b> 💖<br>
    We will meet on <b>14th Feb</b> ❤️<br>
    with <b>godi huggies 🤗</b><br>
    and lots of <b>kisses 😘😘</b>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const mainCard = document.getElementById("mainCard");
    const finalMsg = document.getElementById("finalMsg");

    function moveNo() {
        const x = Math.random() * (window.innerWidth - 120);
        const y = Math.random() * (window.innerHeight - 120);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("touchstart", moveNo);

    let scale = 1;
    yesBtn.addEventListener("mouseover", () => {
        scale += 0.15;
        yesBtn.style.transform = `scale(${scale})`;
    });

    yesBtn.addEventListener("click", () => {
        mainCard.style.display = "none";
        finalMsg.style.display = "block";
        heartRain();
    });

    function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
    }

    function heartRain() {
        setInterval(createHeart, 200);
    }
</script>

</body>
</html>
